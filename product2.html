<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-commence webpage</title>

    <!--fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link 
        href="https://fonts.googleapis.com/css2?family=Anton&display=swap" 
    r   el="stylesheet"
    >
    <link rel="stylesheet" href="css/main.css">
    <script src="js/main.js" defer></script>
        

</head>

<body>
    <div class="alert" id="alert">
        Item added to cart!
    </div>

    <header>
        <h3> Stay Shady.</h3>
        <h1><span class="shade">Shade</span>Lab.</h1>
        
        <nav class="site-nav">
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="cart.html">
                <img class="cart" src="img/cart-icon.png" alt="cart">
                <span class="cart-count" id="cart-count">0</span>
            </a> 
        </nav>
    </header>

    <main class="zulu-brown">
        <div class="zulu-img">
            <img class="image-3" src="img/image.3.jpg" alt="images" />
            <img class="image-12" src="img/image.12.jpg" alt="images" />
        </div>
    
        <div class="zulu-info">
            <div class="h2-row">
                <h2>Zulu Brown</h2>

                <!-- FROM CHAT.GPT (DATA- NAME,PRICE AND iMG) -->
                <button class="add-cart" 
                data-name="zulu brown"
                data-price="50.00"
                data-image="img/image.3.jpg" 
                >
                    Add to Cart
                </button>
            </div>

    
            <div class="price-size">
                <p class="price">$50.00</p>
                <p class="choose"> Size: ONE SIZE </p>
                <button class="size" id="add">ONE SIZE</button>

                <p class="color-zulu"> Color: Brown </p>
                <div class="circle-zulu"> </div>

                <div class="review">
                    <p class="rating">Rating: 5/5</p>
                    <p class="star">★★★★★</p>
                </div>

                <div class="recently-viewed">
                    <p>Recently Viewed</p>
                </div>

                <div class="recently-img">
                    <a href="#"><img class="image-2" src="img/image.2.jpg" alt="images" /></a>
                    <a href="#"><img class="image-6" src="img/image.6.jpg" alt="images" /></a>
                    <a href="#"><img class="image-9" src="img/image.9.jpg" alt="images" /></a>
                    <a href="#"><img class="image-10" src="img/image.10.jpg" alt="images" /></a>   
                </div> 
            </div>
        </div>
    </main>
</body>
</html>
